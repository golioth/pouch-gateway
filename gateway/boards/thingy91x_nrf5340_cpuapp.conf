# PPP networking over Serial Modem
CONFIG_NET_L2_PPP=y
CONFIG_NET_L2_PPP_OPTION_DNS_USE=y

# Network management
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONNECTION_MANAGER=y

# Modem driver
CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y

# CMUX and buffer configuration
# MTU must accommodate PPP frames (up to 1500 bytes for IP packets)
CONFIG_MODEM_CMUX_MTU=1500
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=6000
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE_EXTRA=1024

# UART configuration for nRF5340
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=n

# GPIO
CONFIG_GPIO=y

# Console on RTT (UART0 is used for the modem)
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=y
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048

# Debug logging
CONFIG_LOG_DEFAULT_LEVEL=3

# NB-IoT latency can reach 10s; use greater timeouts
CONFIG_NET_SOCKETS_DNS_TIMEOUT=15000
CONFIG_NET_SOCKETS_CONNECT_TIMEOUT=15000
CONFIG_COAP_INIT_ACK_TIMEOUT_MS=15000
CONFIG_NET_SOCKETS_DTLS_TIMEOUT=15000

# Increase default BT ACL TX count
CONFIG_BT_BUF_ACL_TX_COUNT=7
