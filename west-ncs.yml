manifest:
  group-filter: [+babblesim]

  projects:
    - name: golioth
      path: modules/lib/golioth-firmware-sdk
      revision: d703b1f8805c7584a44dabc31bdf09164637d888
      url: https://github.com/golioth/golioth-firmware-sdk.git
      import:
        file: west-ncs.yml
        name-allowlist:
          - cjson
          - cmsis_6
          - hal_nordic
          - libmetal
          - littlefs
          - mbedtls
          - mcuboot
          - nrf
          - nrfxlib
          - oberon-psa-crypto
          - open-amp
          - segger
          - trusted-firmware-m
          - zcbor
          - zephyr

    - name: ncs-serial-modem
      path: ncs-serial-modem
      revision: v1.0.0
      url: https://github.com/nrfconnect/ncs-serial-modem.git

    - name: pouch
      path: pouch
      revision: 8ba82567c5048d09849f7fa2c7be2e366cfdd824
      url: https://github.com/golioth/pouch

  self:
    path: pouch-gateway
    west-commands: scripts/west-commands.yml
